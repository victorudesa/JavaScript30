<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>JS Drum Kit</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="https://fav.farm/🔥" />
  <!-- <script src="index-solution-01.js" defer></script> -->
  <script src="index-solution-02.js" defer></script>
</head>

<body>
  <div class="keys">
    <button data-key="boom" class="key">
      <kbd>A</kbd>
      <span class="sound">boom</span>
    </button>
    <button data-key="clap" class="key">
      <kbd>S</kbd>
      <span class="sound">clap</span>
    </button>
    <button data-key="hihat" class="key">
      <kbd>D</kbd>
      <span class="sound">hihat</span>
    </button>
    <button data-key="kick" class="key">
      <kbd>F</kbd>
      <span class="sound">kick</span>
    </button>
    <button data-key="openhat" class="key">
      <kbd>G</kbd>
      <span class="sound">openhat</span>
    </button>
    <button data-key="ride" class="key">
      <kbd>H</kbd>
      <span class="sound">ride</span>
    </button>
    <button data-key="snare" class="key">
      <kbd>J</kbd>
      <span class="sound">snare</span>
    </button>
    <button data-key="tink" class="key">
      <kbd>K</kbd>
      <span class="sound">tink</span>
    </button>
    <button data-key="tom" class="key">
      <kbd>L</kbd>
      <span class="sound">tom</span>
    </button>
  </div>

  <audio data-key="clap" src="sounds/clap.wav"></audio>
  <audio data-key="hihat" src="sounds/hihat.wav"></audio>
  <audio data-key="kick" src="sounds/kick.wav"></audio>
  <audio data-key="openhat" src="sounds/openhat.wav"></audio>
  <audio data-key="boom" src="sounds/boom.wav"></audio>
  <audio data-key="ride" src="sounds/ride.wav"></audio>
  <audio data-key="snare" src="sounds/snare.wav"></audio>
  <audio data-key="tom" src="sounds/tom.wav"></audio>
  <audio data-key="tink" src="sounds/tink.wav"></audio>
</body>

</html>
